# ============================================================================
# WARNING: This is NOT the preferred way to configure qbitread.
# This file is only here as an example to show that you can hardcode values
# directly instead of using environment variables.
#
# The preferred method is to use docker-compose.yml with a .env file.
# See .env.example for details.
# ============================================================================

services:
  qbitread:
    image: ghcr.io/jakeward98/qbitread:latest
    container_name: qbitread
    restart: unless-stopped
    ports:
      - "8112:8000"
    environment:
      - QBIT_HOST=http://your-qbittorrent-ip:8080  # REQUIRED: set to your qBittorrent URL
      - QBIT_USERNAME=admin
      - QBIT_PASSWORD=CHANGE_ME_TO_A_STRONG_PASSWORD   # REQUIRED: change before use
      # SECRET_KEY is auto-generated if omitted
      # - SECRET_KEY=change-me-to-a-random-64-char-string
      # Admin credentials (recommended). If omitted, a setup wizard runs on first visit.
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=CHANGE_ME_TO_A_STRONG_PASSWORD   # REQUIRED: change before use
      - SECURE_COOKIES=false
      # Opt-in admin feature: returns qBit creds to the browser for IP-ban recovery.
      # - ENABLE_BROWSER_AUTH=false
    volumes:
      - qbitread_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/login', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  qbitread_data:
