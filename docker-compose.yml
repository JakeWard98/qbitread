services:
  qbitread:
    image: ghcr.io/jakeward98/qbitread:latest
    container_name: qbitread
    restart: unless-stopped
    ports:
      # To restrict to localhost only: "127.0.0.1:8112:8000"
      - "8112:8000"
    environment:
      - QBIT_HOST=${QBIT_HOST:?Set QBIT_HOST in .env}
      - QBIT_USERNAME=${QBIT_USERNAME:-admin}
      - QBIT_PASSWORD=${QBIT_PASSWORD:?Set QBIT_PASSWORD in .env}
      - SECRET_KEY=${SECRET_KEY:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - SECURE_COOKIES=${SECURE_COOKIES:-false}
      - QBIT_BROWSER_HOST=${QBIT_BROWSER_HOST:-}
    volumes:
      - qbitread_data:/app/data

volumes:
  qbitread_data:
