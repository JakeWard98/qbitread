<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setup - qBit Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1>q<span>Bit</span> Dashboard</h1>
  </header>
  <div class="login-wrap">
    <div class="login-box">
      <h2>Initial Setup</h2>
      <p style="color:var(--muted);font-size:13px;margin-bottom:16px;">Create your admin account to get started.</p>
      <form id="setup-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" type="text" value="admin" autocomplete="username" required>
        </div>
        <div class="form-group pw-field-wrap">
          <label for="password">Password <span class="pw-tooltip-trigger" tabindex="0">?<span class="pw-tooltip">Password must contain:<br>- At least 8 characters<br>- 1 uppercase letter (A-Z)<br>- 1 lowercase letter (a-z)<br>- 1 number (0-9)<br>- 1 special character</span></span></label>
          <input id="password" type="password" autocomplete="new-password" required>
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password</label>
          <input id="confirm-password" type="password" autocomplete="new-password" required>
        </div>
        <button type="submit" class="btn-primary login-btn">Create Admin Account</button>
      </form>
      <div class="login-error" id="setup-error"></div>
    </div>
  </div>
  <script data-cfasync="false" src="/static/js/setup.js"></script>
</body>
</html>
