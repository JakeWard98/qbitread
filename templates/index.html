<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qBit Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1>q<span>Bit</span> Dashboard</h1>
    <div class="header-right">
      <div class="spinner" id="spinner"></div>
      <span class="dot dot-red" id="conn-dot" title="Connecting..."></span>
      <a href="/admin" class="btn-ghost" id="btn-admin" style="display:none">Users</a>
      <button class="btn-ghost" id="btn-logout">Logout</button>
      <button class="btn-primary" id="btn-refresh">Refresh</button>
    </div>
  </header>
  <div id="error-bar"></div>
  <div id="stats-bar">
    <div class="stat"><span class="stat-label">Download</span><span class="stat-value dl" id="s-dl">&mdash;</span></div>
    <div class="stat"><span class="stat-label">Upload</span><span class="stat-value ul" id="s-ul">&mdash;</span></div>
  </div>
  <div id="toolbar">
    <div id="toolbar-left">
      <button class="filter-btn active" data-filter="all">All <span class="filter-count" id="fc-all">0</span></button>
      <button class="filter-btn" data-filter="downloading">Downloading <span class="filter-count" id="fc-downloading">0</span></button>
      <button class="filter-btn" data-filter="seeding">Seeding <span class="filter-count" id="fc-seeding">0</span></button>
      <button class="filter-btn" data-filter="completed">Completed <span class="filter-count" id="fc-completed">0</span></button>
      <button class="filter-btn" data-filter="running">Running <span class="filter-count" id="fc-running">0</span></button>
      <button class="filter-btn" data-filter="stopped">Stopped <span class="filter-count" id="fc-stopped">0</span></button>
      <button class="filter-btn" data-filter="active">Active <span class="filter-count" id="fc-active">0</span></button>
      <button class="filter-btn" data-filter="stalled">Stalled <span class="filter-count" id="fc-stalled">0</span></button>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
      <span id="refresh-info"></span>
      <input id="search" type="text" placeholder="Search torrents...">
      <div class="mobile-sort-row">
        <select id="mobile-sort" class="mobile-sort">
          <option value="dlspeed">Sort: DL Speed</option>
          <option value="name">Sort: Name</option>
          <option value="size">Sort: Size</option>
          <option value="progress">Sort: Progress</option>
          <option value="upspeed">Sort: UL Speed</option>
          <option value="eta">Sort: ETA</option>
          <option value="ratio">Sort: Ratio</option>
          <option value="state">Sort: Status</option>
        </select>
        <button type="button" id="mobile-sort-dir" class="mobile-sort-dir" aria-label="Toggle sort direction" aria-pressed="true" title="Descending">&#8595;</button>
      </div>
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-col="name">Name <span class="sort-icon">&#8597;</span></th>
          <th data-col="size">Size <span class="sort-icon">&#8597;</span></th>
          <th data-col="progress" style="min-width:110px">Progress <span class="sort-icon">&#8597;</span></th>
          <th data-col="dlspeed">DL Speed <span class="sort-icon">&#8597;</span></th>
          <th data-col="upspeed">UL Speed <span class="sort-icon">&#8597;</span></th>
          <th data-col="eta">ETA <span class="sort-icon">&#8597;</span></th>
          <th data-col="ratio">Ratio <span class="sort-icon">&#8597;</span></th>
          <th data-col="state">Status <span class="sort-icon">&#8597;</span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty">No torrents match your filter.</div>
  </div>
  <script data-cfasync="false" src="/static/js/app.js"></script>
</body>
</html>
