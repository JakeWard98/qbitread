<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>qBit Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1>q<span>Bit</span> Dashboard</h1>
    <div class="header-right">
      <span class="dot dot-red" id="conn-dot" title="Connecting..."></span>
      <div class="spinner" id="spinner"></div>
      <a href="/admin" class="btn-ghost" id="btn-admin" style="display:none">Users</a>
      <button class="btn-ghost" id="btn-logout">Logout</button>
      <button class="btn-primary" id="btn-refresh">Refresh</button>
    </div>
  </header>
  <div id="error-bar"></div>
  <div id="stats-bar">
    <div class="stat"><span class="stat-label">Download</span><span class="stat-value dl" id="s-dl">&mdash;</span></div>
    <div class="stat"><span class="stat-label">Upload</span><span class="stat-value ul" id="s-ul">&mdash;</span></div>
    <div class="stat"><span class="stat-label">Active</span><span class="stat-value small" id="s-active">&mdash;</span></div>
    <div class="stat"><span class="stat-label">Seeding</span><span class="stat-value small" id="s-seed">&mdash;</span></div>
    <div class="stat"><span class="stat-label">Paused</span><span class="stat-value small" id="s-paused">&mdash;</span></div>
  </div>
  <div id="toolbar">
    <div id="toolbar-left">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="downloading">Downloading</button>
      <button class="filter-btn" data-filter="seeding">Seeding</button>
      <button class="filter-btn" data-filter="stalled">Stalled</button>
      <button class="filter-btn" data-filter="paused">Paused</button>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span id="refresh-info"></span>
      <input id="search" type="text" placeholder="Search torrents...">
    </div>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-col="name">Name <span class="sort-icon">&#8597;</span></th>
          <th data-col="size">Size <span class="sort-icon">&#8597;</span></th>
          <th data-col="progress" style="min-width:110px">Progress <span class="sort-icon">&#8597;</span></th>
          <th data-col="dlspeed">DL Speed <span class="sort-icon">&#8597;</span></th>
          <th data-col="upspeed">UL Speed <span class="sort-icon">&#8597;</span></th>
          <th data-col="eta">ETA <span class="sort-icon">&#8597;</span></th>
          <th data-col="ratio">Ratio <span class="sort-icon">&#8597;</span></th>
          <th data-col="state">Status <span class="sort-icon">&#8597;</span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty">No torrents match your filter.</div>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
