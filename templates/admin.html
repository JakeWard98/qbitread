<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - qBit Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1>q<span>Bit</span> Dashboard</h1>
    <div class="header-right">
      <a href="/" class="btn-ghost">Dashboard</a>
      <button class="btn-ghost" id="btn-logout">Logout</button>
    </div>
  </header>
  <div class="admin-wrap">
    <h2>User Management</h2>
    <div class="admin-form">
      <div class="form-group">
        <label for="new-username">Username</label>
        <input id="new-username" type="text" placeholder="username" autocomplete="off">
      </div>
      <div class="form-group">
        <label for="new-password">Password</label>
        <input id="new-password" type="password" placeholder="min 6 chars" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <div class="checkbox-group">
          <input id="new-admin" type="checkbox">
          <label for="new-admin">Admin</label>
        </div>
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button class="btn-primary" id="btn-create">Create User</button>
      </div>
    </div>
    <div id="admin-error" class="login-error" style="text-align:left;margin-bottom:12px"></div>
    <table class="admin-table">
      <thead>
        <tr>
          <th>Username</th>
          <th>Role</th>
          <th>Created</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="users-tbody"></tbody>
    </table>
  </div>
  <script src="/static/js/admin.js"></script>
</body>
</html>
