<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Management - qBit Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="alternate icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header>
    <h1>q<span>Bit</span> Dashboard</h1>
    <div class="header-right">
      <a href="/" class="btn-ghost">Dashboard</a>
      <button class="btn-ghost" id="btn-logout">Logout</button>
    </div>
  </header>
  <div class="admin-wrap">
    <h2>qBittorrent Connection</h2>
    <div class="admin-form" style="flex-direction:column;gap:14px">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="dot" id="qbit-dot"></span>
        <span id="qbit-status-text" style="font-size:13px">Checking...</span>
        <button class="btn-primary" id="btn-retry-login" style="margin-left:auto">Retry Login</button>
      </div>
      <div id="qbit-status-msg" style="font-size:12px;color:var(--muted)"></div>
      <hr style="border:none;border-top:1px solid var(--border)">
      <div style="font-size:12px;color:var(--muted);margin-bottom:2px">
        Browser Auth — send credentials directly from your browser to qBittorrent to help resolve IP bans.
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
        <div class="form-group" style="margin-bottom:0">
          <label for="qbit-url">qBit URL</label>
          <input id="qbit-url" type="text" placeholder="http://localhost:8080" autocomplete="off" style="width:220px">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label for="qbit-user">Username</label>
          <input id="qbit-user" type="text" placeholder="admin" autocomplete="off" style="width:120px">
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label for="qbit-pass">Password</label>
          <input id="qbit-pass" type="password" placeholder="password" autocomplete="off" style="width:140px">
        </div>
        <button class="btn-ghost" id="btn-autofill" title="Auto-fill credentials from server config">Auto-fill</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn-primary" id="btn-browser-auth">Send Browser Auth</button>
        <button class="btn-ghost" id="btn-open-webui">Open qBit Web UI</button>
      </div>
      <div id="browser-auth-msg" style="font-size:12px;min-height:18px"></div>
    </div>

    <h2 style="margin-top:24px">User Management</h2>
    <div class="admin-form">
      <div class="form-group">
        <label for="new-username">Username</label>
        <input id="new-username" type="text" placeholder="username" autocomplete="off">
      </div>
      <div class="form-group pw-field-wrap">
        <label for="new-password">Password <span class="pw-tooltip-trigger" tabindex="0">?<span class="pw-tooltip">Password must contain:<br>- At least 8 characters<br>- 1 uppercase letter (A-Z)<br>- 1 lowercase letter (a-z)<br>- 1 number (0-9)<br>- 1 special character</span></span></label>
        <input id="new-password" type="password" placeholder="min 8 chars" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="new-role">Role</label>
        <select id="new-role" style="background:#1e1e1e;border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:8px 10px;font-size:13px;outline:none;width:160px">
          <option value="user">User</option>
          <option value="manager">Manager</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label>&nbsp;</label>
        <button class="btn-primary" id="btn-create">Create User</button>
      </div>
    </div>
    <div id="admin-error" class="login-error" style="text-align:left;margin-bottom:12px"></div>
    <table class="admin-table">
      <thead>
        <tr>
          <th>Username</th>
          <th>Role</th>
          <th>Created</th>
          <th>Password</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="users-tbody"></tbody>
    </table>
  </div>
  <script data-cfasync="false" src="/static/js/admin.js"></script>
</body>
</html>
